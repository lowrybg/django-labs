<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}My Django App{% endblock %}</title>
    <style>
        body {
            font-family: sans-serif;
            line-height: 1.5;
            margin: 0;
            background-color: #f4f4f4;
            color: #333;
        }
        header, main, footer {
            padding: 1rem;
        }
        header, footer {
            background-color: #333;
            color: #fff;
            text-align: center;
        }
        main {
            max-width: 800px;
            margin: 0 auto;
            background-color: #fff;
        }
    </style>
</head>
<body>
    <header>
        <h1>My Django Application</h1>
    </header>
    <main>
        {% block content %}
        {% endblock %}
    </main>
    <footer>
        <p>&copy; 2026 My Django App</p>
    </footer>
</body>
</html>
